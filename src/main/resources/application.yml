spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/almoxarifado
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:dev-secret-key-change-in-production-minimum-256-bits}
  expiration: 86400000

logging:
  level:
    com.almoxarifado: DEBUG

cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:3000}

empresa:
  razao-social: "Almoxarifado Ltda"
  cnpj: "00.000.000/0001-00"
  endereco: "Rua das Indústrias, 100 - São Paulo/SP - CEP 01310-100"
  telefone: "(11) 3000-0000"
  email: "contato@almoxarifado.com.br"

nota-fiscal:
  pdf-dir: ${PDF_DIR:${java.io.tmpdir}/almoxarifado/notas-fiscais}
